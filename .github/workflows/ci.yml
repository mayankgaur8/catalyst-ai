name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: Typecheck and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Generate Next.js types
        run: |
          mkdir -p .next/types
          node -e "
            const fs = require('fs');
            const dir = '.next/types';
            if (!fs.existsSync(dir + '/routes.d.ts')) {
              fs.writeFileSync(dir + '/routes.d.ts', '// generated stub for CI\nexport {};\n');
            }
          "

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm run test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Verify standalone output
        run: |
          test -f .next/standalone/server.js || { echo "FATAL: .next/standalone/server.js missing"; exit 1; }
          test -d .next/static               || { echo "FATAL: .next/static missing"; exit 1; }
          echo "Standalone build verified"
