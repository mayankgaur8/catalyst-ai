name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build Next app
        run: npm run build
        env:
          NEXT_PUBLIC_ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}

      - name: Verify Next standalone output
        run: |
          echo "Checking .next standalone output..."
          test -f .next/standalone/server.js
          test -d .next/static
          find .next/standalone -maxdepth 3 -name "server.js" -print

      - name: Prepare Azure deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy

          echo "Copying standalone output..."
          cp -R .next/standalone/. deploy/

          echo "Copying static assets..."
          mkdir -p deploy/.next/static
          cp -R .next/static/. deploy/.next/static/

          echo "Copying public assets..."
          if [ -d public ]; then
            mkdir -p deploy/public
            cp -R public/. deploy/public/
          fi

          echo "Creating compatibility wrapper..."
          mkdir -p deploy/standalone
          printf 'require("../server.js")\n' > deploy/standalone/server.js

          echo "Deploy package preview:"
          find deploy -maxdepth 4 -type f | sort | head -120

      - name: Verify Azure deployment package
        run: |
          echo "Verifying required deployment files..."
          test -f deploy/server.js
          test -f deploy/standalone/server.js
          test -d deploy/.next/static
          echo "Deployment package verified successfully"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: catalyst-ai-mayank
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy
