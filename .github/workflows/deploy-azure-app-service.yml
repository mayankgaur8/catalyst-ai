name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}

      - name: Verify standalone build exists
        run: |
          test -f .next/standalone/server.js
          test -d .next/static

      - name: Prepare deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy

          # Copy standalone server
          cp -R .next/standalone/. deploy/

          # Copy static assets
          mkdir -p deploy/.next/static
          cp -R .next/static/. deploy/.next/static/

          # Copy public folder
          if [ -d public ]; then
            mkdir -p deploy/public
            cp -R public/. deploy/public/
          fi

          # Compatibility fallback
          mkdir -p deploy/standalone
          cat > deploy/standalone/server.js <<'EOF'
          require("../server.js")
          EOF

          echo "DEPLOY CONTENTS:"
          find deploy -maxdepth 3 -type f | sort

          echo "VERIFY ROOT SERVER:"
          test -f deploy/server.js

      - name: Fail if deploy/server.js missing
        run: |
          if [ ! -f deploy/server.js ]; then
            echo "ERROR: deploy/server.js missing"
            exit 1
          fi

      # ── Deploy to Azure App Service ──────────────────────────────────────────
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: catalyst-ai-mayank
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy
