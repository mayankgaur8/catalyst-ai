name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build Next app
        run: npm run build

      - name: Verify Next standalone output
        run: |
          echo "Checking standalone output..."
          test -f .next/standalone/server.js || { echo "FATAL: .next/standalone/server.js missing"; exit 1; }
          test -d .next/static               || { echo "FATAL: .next/static missing"; exit 1; }
          find .next/standalone -maxdepth 3 -name "server.js" -print
          echo "Standalone output OK"

      - name: Prepare Azure deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy

          echo "Copying standalone output..."
          cp -R .next/standalone/. deploy/

          echo "Copying static assets..."
          mkdir -p deploy/.next/static
          cp -R .next/static/. deploy/.next/static/

          echo "Copying public assets..."
          if [ -d public ]; then
            mkdir -p deploy/public
            cp -R public/. deploy/public/
          fi

          echo "Creating compatibility wrapper..."
          mkdir -p deploy/standalone
          printf 'require("../server.js")\n' > deploy/standalone/server.js

          echo "Replacing full package.json with minimal stub..."
          cat > deploy/package.json << 'PKGJSON'
          {
            "name": "catprep",
            "version": "0.1.0",
            "scripts": {
              "start": "node server.js"
            }
          }
          PKGJSON

          echo "Deploy package preview (top 60 files):"
          find deploy -maxdepth 4 -type f | sort | head -60

      - name: Verify Azure deployment package
        run: |
          echo "Verifying required files..."
          test -f deploy/server.js            || { echo "FATAL: deploy/server.js missing"; exit 1; }
          test -f deploy/standalone/server.js  || { echo "FATAL: deploy/standalone/server.js missing"; exit 1; }
          test -d deploy/.next/static         || { echo "FATAL: deploy/.next/static missing"; exit 1; }
          echo "package.json start script:"
          node -e "const p=require('./deploy/package.json');console.log(p.scripts.start)"
          echo "All required files present"

      - name: Zip deployment package
        run: |
          cd deploy
          zip -r -y ../deploy.zip .
          cd ..
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"
          echo "server.js entries in zip:"
          unzip -l deploy.zip | grep "server\.js"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: catalyst-ai-mayank
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
