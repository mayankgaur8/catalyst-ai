name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}

      - name: Verify Next standalone output
        run: |
          test -f .next/standalone/server.js
          echo "Standalone server exists"
          find .next/standalone -maxdepth 2 -name "server.js" -print
          test -d .next/static

      - name: Prepare Azure deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy

          echo "Copying standalone output..."
          cp -R .next/standalone/. deploy/

          echo "Copying static assets..."
          mkdir -p deploy/.next/static
          cp -R .next/static/. deploy/.next/static/

          echo "Copying public assets..."
          if [ -d public ]; then
            mkdir -p deploy/public
            cp -R public/. deploy/public/
          fi

          echo "Creating compatibility wrapper..."
          mkdir -p deploy/standalone
          cat > deploy/standalone/server.js <<'EOF'
          require("../server.js")
          EOF

          echo "Final deploy package:"
          find deploy -maxdepth 4 -type f | sort | head -100

          test -f deploy/server.js
          test -f deploy/standalone/server.js
          test -d deploy/.next/static

      - name: Verify deployment package before upload
        run: |
          echo "Deploy folder:"
          pwd
          ls -la deploy
          echo "Find server files:"
          find deploy -maxdepth 4 -name "server.js" -print
          echo "Verify required files:"
          test -f deploy/server.js
          test -f deploy/standalone/server.js
          test -d deploy/.next/static
          echo "Deployment package verified successfully"

      - name: Fail if deploy/server.js missing
        run: |
          if [ ! -f deploy/server.js ]; then
            echo "ERROR: deploy/server.js missing"
            exit 1
          fi

      # ── Deploy to Azure App Service ──────────────────────────────────────────
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: catalyst-ai-mayank
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy
