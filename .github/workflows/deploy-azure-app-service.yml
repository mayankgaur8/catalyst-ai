name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check publish profile secret
        env:
          PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -z "$PROFILE" ]; then
            echo "FATAL: AZURE_WEBAPP_PUBLISH_PROFILE secret is not set."
            echo "Fix: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: AZURE_WEBAPP_PUBLISH_PROFILE"
            echo "Value: paste the XML from Azure Portal → App Service → Get publish profile"
            exit 1
          fi
          PROFILE_LEN=${#PROFILE}
          echo "Publish profile length: $PROFILE_LEN chars"
          if echo "$PROFILE" | grep -q 'publishProfile'; then
            echo "Publish profile XML looks valid (contains 'publishProfile')"
          else
            echo "WARNING: PROFILE does not look like a publish profile XML"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build Next app
        run: npm run build

      - name: Verify Next standalone output
        run: |
          test -f .next/standalone/server.js || { echo "FATAL: .next/standalone/server.js missing"; exit 1; }
          test -d .next/static               || { echo "FATAL: .next/static missing"; exit 1; }
          echo "Standalone OK"

      - name: Prepare Azure deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy

          cp -R .next/standalone/. deploy/

          mkdir -p deploy/.next/static
          cp -R .next/static/. deploy/.next/static/

          if [ -d public ]; then
            mkdir -p deploy/public
            cp -R public/. deploy/public/
          fi

          mkdir -p deploy/standalone
          printf 'require("../server.js")\n' > deploy/standalone/server.js

          node -e "
            var fs = require('fs');
            var pkg = { name: 'catprep', version: '0.1.0', scripts: { start: 'node server.js' } };
            fs.writeFileSync('deploy/package.json', JSON.stringify(pkg, null, 2) + '\n');
            var lock = { name: 'catprep', version: '0.1.0', lockfileVersion: 3, requires: true, packages: {} };
            fs.writeFileSync('deploy/package-lock.json', JSON.stringify(lock, null, 2) + '\n');
            console.log('Wrote minimal package.json and package-lock.json');
          "

          # Tell Kudu to skip build automation entirely
          printf '[config]\nSCM_DO_BUILD_DURING_DEPLOYMENT = false\n' > deploy/.deployment

      - name: Verify deployment package
        run: |
          test -f deploy/server.js            || { echo "FATAL: deploy/server.js missing"; exit 1; }
          test -f deploy/standalone/server.js  || { echo "FATAL: deploy/standalone/server.js missing"; exit 1; }
          test -d deploy/.next/static         || { echo "FATAL: deploy/.next/static missing"; exit 1; }
          test -f deploy/.deployment          || { echo "FATAL: deploy/.deployment missing"; exit 1; }
          START=$(node -e "process.stdout.write(require('./deploy/package.json').scripts.start)")
          [ "$START" = "node server.js" ] || { echo "FATAL: package.json start='$START'"; exit 1; }
          echo "Package verified — start=$START"

      - name: Zip deployment package
        run: |
          cd deploy
          zip -r -y ../deploy.zip .
          cd ..

      - name: Verify zip structure
        run: |
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"
          echo "--- server.js entries ---"
          unzip -l deploy.zip | grep "server\.js"
          echo "--- package.json ---"
          unzip -p deploy.zip package.json
          unzip -l deploy.zip | awk '{print $NF}' | grep -qx 'server\.js' \
            || { echo "FATAL: server.js NOT at zip root"; exit 1; }
          unzip -l deploy.zip | awk '{print $NF}' | grep -qx 'standalone/server\.js' \
            || { echo "FATAL: standalone/server.js missing from zip"; exit 1; }
          unzip -l deploy.zip | awk '{print $NF}' | grep -qx '\.deployment' \
            || { echo "FATAL: .deployment missing from zip"; exit 1; }
          echo "Zip structure OK"

      - name: Configure Azure app settings via Kudu
        continue-on-error: true
        env:
          PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          KUSER=$(echo "$PROFILE" | grep -oE 'userName="[^"]+"' | head -1 | sed 's/userName="//;s/"//' || true)
          KPASS=$(echo "$PROFILE" | grep -oE 'userPWD="[^"]+"'  | head -1 | sed 's/userPWD="//;s/"//' || true)
          echo "::add-mask::$KPASS"
          echo "::add-mask::$KUSER"

          KUDU="https://catalyst-ai-mayank.scm.azurewebsites.net"

          echo "Setting all required app settings via Kudu..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -X PUT "$KUDU/api/settings" \
            -u "$KUSER:$KPASS" \
            -H "Content-Type: application/json" \
            -d '{
              "SCM_DO_BUILD_DURING_DEPLOYMENT": "false",
              "ENABLE_ORYX_BUILD": "false",
              "WEBSITE_NODE_DEFAULT_VERSION": "~22",
              "NODE_ENV": "production",
              "PORT": "8080"
            }' || echo "000")
          echo "Kudu /api/settings HTTP $STATUS"

          if [ "$STATUS" = "204" ] || [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "App settings updated successfully"
          else
            echo "Warning: Kudu settings returned $STATUS"
            echo "Manual fallback: set these in Azure Portal → Configuration → Application settings:"
            echo "  SCM_DO_BUILD_DURING_DEPLOYMENT = false"
            echo "  ENABLE_ORYX_BUILD = false"
            echo "  WEBSITE_NODE_DEFAULT_VERSION = ~22"
            echo "  NODE_ENV = production"
            echo "  PORT = 8080"
          fi

      - name: Clean stale wwwroot files via Kudu
        continue-on-error: true
        env:
          PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          KUSER=$(echo "$PROFILE" | grep -oE 'userName="[^"]+"' | head -1 | sed 's/userName="//;s/"//' || true)
          KPASS=$(echo "$PROFILE" | grep -oE 'userPWD="[^"]+"'  | head -1 | sed 's/userPWD="//;s/"//' || true)
          echo "::add-mask::$KPASS"
          echo "::add-mask::$KUSER"

          KUDU="https://catalyst-ai-mayank.scm.azurewebsites.net"

          echo "Cleaning /home/site/wwwroot before fresh deploy..."
          STATUS=$(curl -s -o /tmp/kudu_clean.txt -w "%{http_code}" --max-time 60 \
            -X POST "$KUDU/api/command" \
            -u "$KUSER:$KPASS" \
            -H "Content-Type: application/json" \
            -d '{"command":"rm -rf /home/site/wwwroot/* /home/site/wwwroot/.[!.]*","dir":"/home/site"}' || echo "000")
          echo "Kudu /api/command HTTP $STATUS"
          cat /tmp/kudu_clean.txt || true
          echo "wwwroot cleaned (or skipped if auth failed)"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: catalyst-ai-mayank
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip

      - name: Verify server.js landed in Azure wwwroot
        continue-on-error: true
        env:
          PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          KUSER=$(echo "$PROFILE" | grep -oE 'userName="[^"]+"' | head -1 | sed 's/userName="//;s/"//' || true)
          KPASS=$(echo "$PROFILE" | grep -oE 'userPWD="[^"]+"'  | head -1 | sed 's/userPWD="//;s/"//' || true)
          echo "::add-mask::$KPASS"
          echo "::add-mask::$KUSER"

          KUDU="https://catalyst-ai-mayank.scm.azurewebsites.net"

          echo "Waiting 20s for deployment extraction to complete..."
          sleep 20

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            -u "$KUSER:$KPASS" \
            "$KUDU/api/vfs/site/wwwroot/server.js" || echo "000")
          echo "wwwroot/server.js VFS check: HTTP $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "SUCCESS: /home/site/wwwroot/server.js confirmed present"
          else
            echo "FAIL: server.js not found (HTTP $STATUS)"
            echo "--- wwwroot listing ---"
            curl -s --max-time 15 -u "$KUSER:$KPASS" "$KUDU/api/vfs/site/wwwroot/" | \
              node -e "var d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{ try { JSON.parse(d).forEach(f=>console.log(f.name,f.mime)); } catch(e) { console.log(d); } })"
          fi
